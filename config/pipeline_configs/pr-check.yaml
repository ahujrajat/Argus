name: pr-check
version: 1
is_default: true
mode: real_time
nodes:
  - id: ingestion
    agent: IngestionAgent
    tier: fast
    budget_pct: 5
  - id: sast
    agent: SemgrepAdapter
    tier: none
    budget_pct: 0
  - id: triage
    agent: TriageAgent
    tier: balanced
    budget_pct: 50
  - id: explainer
    agent: ExplainerAgent
    tier: fast
    budget_pct: 20
edges:
  - from: ingestion
    to: sast
    condition: null
  - from: sast
    to: triage
    condition: null
  - from: triage
    to: explainer
    condition: null
