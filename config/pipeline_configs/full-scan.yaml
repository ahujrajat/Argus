name: full-scan
version: 1
is_default: true
mode: at_rest
nodes:
  - id: ingestion
    agent: IngestionAgent
    tier: fast
    budget_pct: 5
  - id: sast
    agent: SemgrepAdapter
    tier: none
    budget_pct: 0
  - id: secrets
    agent: TruffleHogAdapter
    tier: none
    budget_pct: 0
  - id: triage
    agent: TriageAgent
    tier: balanced
    budget_pct: 40
  - id: explainer
    agent: ExplainerAgent
    tier: fast
    budget_pct: 15
  - id: fix_generation
    agent: FixAgent
    tier: balanced
    budget_pct: 35
edges:
  - from: ingestion
    to: sast
    condition: null
  - from: ingestion
    to: secrets
    condition: null
  - from: sast
    to: triage
    condition: null
  - from: secrets
    to: triage
    condition: null
  - from: triage
    to: explainer
    condition: null
  - from: explainer
    to: fix_generation
    condition: null
