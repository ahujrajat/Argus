name: iac-scan
version: 1
is_default: false
mode: at_rest
nodes:
  - id: ingestion
    agent: IngestionAgent
    tier: fast
    budget_pct: 10
  - id: iac
    agent: CheckovAdapter
    tier: none
    budget_pct: 0
  - id: triage
    agent: TriageAgent
    tier: balanced
    budget_pct: 55
  - id: explainer
    agent: ExplainerAgent
    tier: fast
    budget_pct: 35
edges:
  - from: ingestion
    to: iac
    condition: null
  - from: iac
    to: triage
    condition: null
  - from: triage
    to: explainer
    condition: null
