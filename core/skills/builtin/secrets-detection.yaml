name: secrets-detection
version: 1
description: Pattern guidance for detecting and triaging secrets in codebases
languages: []
frameworks: []
activation: active
body: |
  When analyzing secrets findings:
  - Prioritize verified secrets (TruffleHog verified=true) over unverified matches
  - High-value secret types: AWS access keys, private keys (RSA/EC), API tokens (GitHub, Stripe, Twilio), database URLs with credentials
  - Medium-value: JWT signing secrets, internal API keys, webhook secrets
  - Low-value: test/example credentials matching known patterns (test123, changeme, example)
  - Check git history depth: secrets found only in old commits may already be rotated
  - Look for .env files, *.pem, *.key, *.p12 in git history — these are often the highest risk
  - When a secret is confirmed live, flag as critical regardless of file location
  - Dedup by secret fingerprint, not by file — same secret leaked in multiple files is one finding
